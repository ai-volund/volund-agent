# RuntimeClass for gVisor (must be installed on the cluster).
# On GKE: gVisor is a built-in runtime class.
# On bare metal/kind: install runsc and create this RuntimeClass.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-service
  namespace: default
  labels:
    app: sandbox-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-service
  template:
    metadata:
      labels:
        app: sandbox-service
    spec:
      # Use gVisor runtime for kernel-level isolation.
      # Comment out runtimeClassName for environments without gVisor.
      # runtimeClassName: gvisor
      containers:
        - name: sandbox
          image: ghcr.io/ai-volund/sandbox-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: SANDBOX_ADDR
              value: ":8090"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false  # needs writable /tmp for code execution
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-service
  namespace: default
spec:
  selector:
    app: sandbox-service
  ports:
    - port: 8090
      targetPort: 8090
