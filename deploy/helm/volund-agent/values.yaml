# Volund Agent values

# Number of warm pool agent pods.
replicaCount: 3

image:
  repository: ghcr.io/ai-volund/volund-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Agent profile configuration.
agent:
  profileName: default
  profileType: specialist
  provider: anthropic
  model: claude-sonnet-4-5
  maxTokens: 8192
  maxToolRounds: 10
  contextBudget: 100000
  systemPrompt: ""

# Infrastructure
nats:
  url: ""  # e.g. nats://nats:4222

llmRouter:
  addr: "volund:9090"

gateway:
  url: "http://volund:8080"

redis:
  addr: ""  # e.g. redis:6379

# Sandbox
sandbox:
  enabled: false
  endpoint: ""  # e.g. http://sandbox-service:8090

# OpenTelemetry
otel:
  enabled: false
  endpoint: ""

environment: prod

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Network Policies
networkPolicy:
  enabled: false
  # Allow egress to control plane gateway (gRPC + HTTP)
  gatewayPodSelector:
    app.kubernetes.io/name: volund
  gatewayGrpcPort: 9090
  gatewayHttpPort: 8080
  # Allow egress to NATS
  natsPort: 4222
  # Block cloud metadata endpoint (169.254.169.254)
  blockMetadata: true

# Resource Quotas (for agent namespace)
resourceQuota:
  enabled: false
  hard:
    pods: "20"
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
