# Sandbox Router — manages sandbox claim lifecycle and proxies execution requests.
# Deployed per-cluster. Requires RBAC to create/delete/watch SandboxClaim CRs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-router
  namespace: default
  labels:
    app: sandbox-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-router
  labels:
    app: sandbox-router
rules:
  - apiGroups: ["sandbox.volund.ai"]
    resources: ["sandboxclaims"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: ["sandbox.volund.ai"]
    resources: ["sandboxclaims/status"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-router
  labels:
    app: sandbox-router
subjects:
  - kind: ServiceAccount
    name: sandbox-router
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-router
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-router
  namespace: default
  labels:
    app: sandbox-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      serviceAccountName: sandbox-router
      containers:
        - name: sandbox-router
          image: ghcr.io/ai-volund/sandbox-router:latest
          ports:
            - containerPort: 8091
          env:
            - name: SANDBOX_ROUTER_ADDR
              value: ":8091"
            - name: SANDBOX_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SANDBOX_POOL_REF
              value: "tool-execution-pool"
            - name: SANDBOX_CLAIM_TTL
              value: "3600"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-router
  namespace: default
  labels:
    app: sandbox-router
spec:
  selector:
    app: sandbox-router
  ports:
    - port: 8091
      targetPort: 8091
